<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta charset="utf-8" />
  <title>Browserpad - A notepad in the browser</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
  <textarea id="textbox" autofocus="autofocus" placeholder="type here"></textarea>
  <nav>
    <span id="stats">
      <span id="char-count">0</span> chars │
      <span id="word-count">0</span> words │
      <span id="line-count">0</span> lines
    </span>
    <span id="controls">
      <input type="checkbox" id="fullwidth" />
      <label for="fullwidth">80 Column</label> │
      <input type="checkbox" id="spellcheck" />
      <label for="spellcheck">spell-checking</label> │
      <a href="#" id="print">print</a> │
      <span id="open">
        <input type="file" value="open" />
        <a href="#">open</a>
      </span>
      <span id="save">
        <input id="filename" placeholder="browserpad.txt" />
        <a href="#">save</a>
      </span> │
      <a href="#" title="About Browserpad" id="about-icon">ⓘ</a>
    </span>
  </nav>
  <dialog id="about">
    <h2>Browserpad</h2>
    <p>As the name indicates, Browserpad is a notepad in the browser.</p>
    <p>It is a plain text editor built entirely with HTML, CSS and JavaScript without any backend.</p>
    <p>The source code is based on original Browserpad <a href="https://github.com/Browserpad/browserpad">available on GitHub</a>.</p>
    <p><a href='https://ko-fi.com/J3J519JUE4' target='_blank'><img height='36' style='border:0px;height:36px;' src='https://storage.ko-fi.com/cdn/kofi3.png?v=6' border='0' alt='Buy Me a Coffee at ko-fi.com' /></a></p>
    <form method="dialog"><button>close</button></form>
  </dialog>
  <script src="script.js"></script>
</body>
</html>
